[workspace]
resolver = "3"
members = ["crates/tuigram-core", "crates/tuigram"]

[workspace.package]
version = "0.0.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/queq-co/tuigram"
authors = ["queq & co."]
rust-version = "1.96"

# Project-wide lints. Telegram/TDLib FFI will introduce `unsafe` later; we keep
# it visible (warn, not deny) so every use is a deliberate, reviewed decision.
[workspace.lints.rust]
unsafe_code = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }

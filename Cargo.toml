[workspace]
resolver = "3"
members = ["crates/tuigram-core", "crates/tuigram"]

[workspace.package]
version = "0.0.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/queq-co/tuigram"
authors = ["queq & co."]
rust-version = "1.96"

# Dependencies shared across crates. Pinned exactly: `tdlib-rs` transitively
# fixes the TDLib version (1.8.61) and the prebuilt tdjson artifact, and TDLib
# has no stable ABI across versions — see docs/research/tdlib.md. Bumps are
# deliberate, tested events. We pull no tdjson source feature here; each crate
# selects one (download-tdlib / local-tdlib / pkg-config) via its own features.
[workspace.dependencies]
tdlib-rs = { version = "=1.4.0", default-features = false }
tokio = { version = "1", default-features = false }
# Stream adapters over tokio channels (BroadcastStream + StreamExt) for the
# TDLib update stream exposed by tuigram-core's bridge.
tokio-stream = { version = "0.1", default-features = false, features = ["sync"] }
# Config (de)serialization for ~/.config/tuigram/config.toml (api_id/api_hash).
serde = { version = "1", features = ["derive"] }
toml = { version = "1" }
# Isolated temp dirs for filesystem unit tests (config perms, resolution order).
tempfile = { version = "3" }

# Project-wide lints. Telegram/TDLib FFI will introduce `unsafe` later; we keep
# it visible (warn, not deny) so every use is a deliberate, reviewed decision.
[workspace.lints.rust]
unsafe_code = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }

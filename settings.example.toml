# tuigram settings — copy to ~/.config/tuigram/settings.toml and edit.
#
#   cp settings.example.toml ~/.config/tuigram/settings.toml
#
# This file is plain preferences — NOT secrets. Credentials (api_id / api_hash)
# live separately in ~/.config/tuigram/config.toml, which the login flow writes
# for you. tuigram writes a default settings.toml on first run (it never
# overwrites your edits), and the in-app editor (press "," while browsing) can
# rewrite it — but hand-editing this file works just as well.
#
# Every key is optional. A missing file, a missing table, or a missing key
# falls back to the safe default noted below, and a malformed value is ignored
# with a warning rather than blocking startup. The defaults keep everything, so
# retention is strictly opt-in — an unconfigured install deletes nothing.

# Download-cache retention. Downloaded media (photos, videos, documents)
# accumulates in TDLib's cache with no bound; these knobs cap it.
[storage]

# Per-kind time-to-live: delete media not *accessed* within this window, so
# opening a file resets its clock. Grouped as the official apps group their
# "Keep Media" controls. Each is "forever" (never delete — the default) or a
# duration: a day/week/month count with a d/w/m suffix ("3d", "1w", "1m"), or a
# bare number of days ("14"). A month is a flat 30 days.
keep_private  = "forever"   # one-to-one chats (and secret chats)
keep_groups   = "forever"   # basic groups + supergroups
keep_channels = "forever"   # broadcast channels

# Global size backstop across *every* chat, independent of the per-kind TTLs
# above. The per-kind sweeps only reach chats you've opened this session, so
# this ceiling bounds the total cache regardless of which chats have loaded;
# TDLib evicts least-recently-used files first to stay under it. Either
# "unbounded" (no cap — the default) or a size: "512MB", "2GB" (the bare letter
# K/M/G also works), or a plain byte count ("1073741824" / "1073741824B").
# Units are binary (1GB = 1024 MB).
max_cache = "unbounded"

# Terminal-UI behaviour.
[interface]

# Mouse support: when on (the default), clicking a pane focuses it and the mouse
# wheel scrolls whichever pane the pointer is over. Enabling it takes over the
# terminal's native text selection, so set this to false if you'd rather keep
# drag-to-select (on most emulators Shift/Option-drag bypasses capture anyway).
mouse = true

# Graphics rendering: when on (the default), sender avatars and inline media
# (photos, stickers, GIF/video stills) draw as images on a graphics-capable
# terminal (Sixel/Kitty/iTerm2). Set this to false for a purist, text-only TUI —
# no avatar gutter (not even the generated fallback bubble) and text
# placeholders for media — even on a terminal that could otherwise show them.
# Takes effect live; the in-app editor can flip it without a restart.
graphics = true

name: CI

# Cross-target build/test matrix. The point of this matrix is to prove the
# project builds and its native deps resolve on every distribution target we
# care about — not to assume a single host (see docs/research/tdlib.md,
# "Native dependencies across targets").

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # Historical total job time is ~3.5 minutes across the matrix (#223); this
    # is a generous ceiling so a genuine hang (e.g. windows-x86_64 stuck on
    # Test) fails fast and visibly instead of silently burning runner-minutes
    # up to GitHub's 360-minute default.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x86_64,  os: ubuntu-latest }
          - { name: linux-arm64,   os: ubuntu-24.04-arm } # GA hosted arm64 runner (#173)
          - { name: macos-arm64,   os: macos-15 }      # Apple Silicon (only macOS target we support); current GA arm64 image
          - { name: windows-x86_64, os: windows-latest }
          # Deferred (no GitHub-hosted runner): windows-arm64.
          # Cover this via cross-compilation / self-hosted runners in Phase 2+.
          # macOS Intel (x86_64) is intentionally not supported.

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Honors rust-toolchain.toml (channel + rustfmt/clippy).
      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # The Linux prebuilt tdjson links LLVM's libc++ (not libstdc++), which is
      # not preinstalled on ubuntu runners. OpenSSL 3 + zlib already are. Install
      # the libc++ runtime so the read-only check below passes. Matches the apt
      # hint in scripts/check-native-deps.sh.
      - name: Install Linux native deps (libc++)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libc++1 libc++abi1

      # Single per-OS source of truth for OpenSSL 3 + zlib + libc++. Read-only
      # check; on macOS it expects Homebrew openssl@3 (preinstalled on GitHub
      # runners), and libc++ is the macOS system C++ runtime (always present).
      - name: Check native deps (OpenSSL 3 + zlib + libc++)
        if: runner.os != 'Windows'
        shell: bash
        run: ./scripts/check-native-deps.sh

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # download-tdlib is tuigram-core's default tdjson source, so this is the
      # prebuilt-tdjson build across the matrix (#10). The feature is named
      # explicitly so the intent survives any change to the default, and so the
      # artifact the linkage audit below inspects is unambiguously produced here.
      - name: Build (download-tdlib)
        run: cargo build --workspace --all-targets --features tuigram-core/download-tdlib

      - name: Test
        run: cargo test --workspace

      # ---------------------------------------------------------------------
      # Linkage audit (#10): introspect what the prebuilt tdjson actually links
      # against, per target, and assert it matches what scripts/check-native-deps.sh
      # provisions on the host. check-native-deps.sh stays the source of truth for
      # *host* deps (run before the build); these steps verify the *artifact*. This
      # is the continuous version of the one-off macOS probe — the real "works
      # regardless of arch" guarantee. The audit prints the full dependency list
      # for the record, then fails loudly if an expected dep is missing.
      #
      # Expected per target (see docs/research/tdlib.md):
      #   Linux  — dynamic OpenSSL 3 (libssl/libcrypto.so.3) + zlib (libz.so.1);
      #            libc++ provisioned above so ldd resolves cleanly.
      #   macOS  — dynamic Homebrew openssl@3 (libssl/libcrypto.3.dylib) + system
      #            libz.1 (release builds bundle OpenSSL via bundle-native-deps.sh).
      #   Windows — OpenSSL/zlib are statically bundled in the prebuilt, so the DLL
      #            must NOT carry an external crypto/zlib import; assert it is
      #            self-contained.
      # ---------------------------------------------------------------------
      - name: Linkage audit (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          lib=$(find target -name 'libtdjson.so*' -print -quit)
          test -n "$lib" || { echo "FAIL: no libtdjson.so found under target/"; exit 1; }
          echo "== ldd $lib =="
          deps=$(ldd "$lib"); echo "$deps"
          grep -q 'libssl\.so\.3'    <<<"$deps" || { echo "FAIL: missing libssl.so.3";    exit 1; }
          grep -q 'libcrypto\.so\.3' <<<"$deps" || { echo "FAIL: missing libcrypto.so.3"; exit 1; }
          grep -q 'libz\.so\.1'      <<<"$deps" || { echo "FAIL: missing libz.so.1";      exit 1; }
          echo "OK: Linux tdjson links OpenSSL 3 (libssl/libcrypto.so.3) + zlib (libz.so.1)"

      - name: Linkage audit (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          lib=$(find target -name 'libtdjson*.dylib' -print -quit)
          test -n "$lib" || { echo "FAIL: no libtdjson.dylib found under target/"; exit 1; }
          echo "== otool -L $lib =="
          deps=$(otool -L "$lib"); echo "$deps"
          grep -q 'libssl\.3\.dylib'    <<<"$deps" || { echo "FAIL: missing libssl.3.dylib";    exit 1; }
          grep -q 'libcrypto\.3\.dylib' <<<"$deps" || { echo "FAIL: missing libcrypto.3.dylib"; exit 1; }
          grep -q '/libz\.1\.dylib'     <<<"$deps" || { echo "FAIL: missing libz.1.dylib";      exit 1; }
          echo "OK: macOS tdjson links Homebrew OpenSSL 3 + system zlib"

      - name: Linkage audit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $lib = Get-ChildItem -Recurse -Filter 'tdjson*.dll' target | Select-Object -First 1
          if (-not $lib) { Write-Error 'FAIL: no tdjson.dll found under target/'; exit 1 }
          # dumpbin ships with MSVC but is not on PATH; locate it via vswhere
          # (preinstalled on GitHub-hosted Windows runners).
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $dumpbin = & $vswhere -latest -find '**\dumpbin.exe' | Select-Object -First 1
          if (-not $dumpbin) { Write-Error 'FAIL: dumpbin.exe not found via vswhere'; exit 1 }
          Write-Host "== $dumpbin /DEPENDENTS $($lib.FullName) =="
          $deps = & $dumpbin /DEPENDENTS $lib.FullName
          $deps | Write-Host
          # OpenSSL/zlib are statically bundled in the Windows prebuilt — assert the
          # DLL does NOT dynamically import an external crypto/zlib library.
          if ($deps -match '(?i)libssl|libcrypto|ssleay|libeay|zlib1?\.dll') {
            Write-Error 'FAIL: Windows tdjson unexpectedly imports an external OpenSSL/zlib DLL'
            exit 1
          }
          Write-Host 'OK: Windows tdjson is self-contained (OpenSSL/zlib bundled, no external import)'

      # Release packaging (separate release workflow, macOS only): make the
      # shipped binary self-contained so end users need no Homebrew —
      #   ./scripts/bundle-native-deps.sh target/release/tuigram
      # (no-op on Linux/Windows). See docs/research/tdlib.md, "Distribution strategy".

  # rustdoc pass (#175). `missing_docs` itself is already a hard error via the
  # `build` job's `cargo clippy -- -D warnings` (missing_docs is a rustc lint,
  # promoted by -D warnings same as any clippy lint). This job's job is what
  # that doesn't check: broken/redundant intra-doc links, and that the crate's
  # doctests actually compile and pass.
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo doc (intra-doc links)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps -p tuigram-core
      - name: Doctests
        run: cargo test --doc -p tuigram-core

  # crates.io publish readiness (#171/#175): guards tuigram-core's public API
  # against accidental breaking changes. cargo-semver-checks compares against
  # the last version published to crates.io, so there is no baseline until
  # #171's first publish lands — self-gate on that rather than fail every run
  # until then. Once tuigram-core is live on the index this starts doing real
  # work automatically, with no follow-up change needed here.
  semver-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check whether tuigram-core has a published baseline
        id: baseline
        run: |
          if curl -sf https://crates.io/api/v1/crates/tuigram-core >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "tuigram-core is not yet published to crates.io — skipping cargo-semver-checks. This activates automatically once #171's first publish lands."
          fi
      - name: Install Rust toolchain
        if: steps.baseline.outputs.published == 'true'
        run: rustup show
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: steps.baseline.outputs.published == 'true'
      # taiki-e/install-action's own README warns against hashing the
      # `@<tool-name>` convenience tag directly (it moves on every tool
      # release, so a hash of it can reference a commit later absent from the
      # repo — an "impostor commit"). Pin the *action's* versioned release tag
      # instead and select the tool via `with:`.
      - uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2.83.3
        if: steps.baseline.outputs.published == 'true'
        with:
          tool: cargo-semver-checks
      - name: cargo semver-checks
        if: steps.baseline.outputs.published == 'true'
        run: cargo semver-checks check-release -p tuigram-core

  # Coverage map (#181): cargo-llvm-cov over the workspace, uploaded as an
  # artifact (HTML report for browsing + lcov.info for tooling). Informational
  # only — no percentage gate. A floor would reward padding easy tests to hit a
  # number over fixing the load-bearing gaps the issue actually cared about;
  # the gap list, read from the artifact, is the deliverable, not the percentage.
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain
        run: rustup show
      - name: Install llvm-tools-preview
        run: rustup component add llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # See the semver-checks job above for why this pins the versioned
      # release tag rather than hashing the `@cargo-llvm-cov` convenience tag.
      - uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2.83.3
        with:
          tool: cargo-llvm-cov
      - name: cargo llvm-cov
        run: |
          cargo llvm-cov --workspace --html --output-dir target/llvm-cov-html
          cargo llvm-cov report --lcov --output-path target/lcov.info
          cargo llvm-cov report --summary-only
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: |
            target/llvm-cov-html
            target/lcov.info
          retention-days: 30

  # Dependency hygiene gate (#176): advisories/licenses/bans/sources via
  # cargo-deny, backed by the committed deny.toml. `-A unmaintained -A notice`
  # downgrades those two categories to non-fatal (deny.toml's header comment
  # explains why — this cargo-deny version has no per-category config keys for
  # it); vulnerability/yanked/unsound/licenses/bans/sources stay at cargo-deny's
  # default deny level. The weekly-scheduled sibling (deny-weekly.yml) runs the
  # same check on a cron so new RustSec advisories are caught between pushes.
  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # See the semver-checks job above for why this pins the versioned
      # release tag rather than hashing the `@cargo-deny` convenience tag.
      - uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2.83.3
        with:
          tool: cargo-deny
      - name: cargo deny check
        run: cargo deny check -A unmaintained -A notice

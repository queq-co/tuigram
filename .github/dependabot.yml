version: 2
updates:
  # Keep GitHub Actions current (catches deprecations like checkout@v4 /
  # macos-14 automatically).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"

  # Rust deps. Inert until the workspace gains external crates (tdlib-rs,
  # ratatui, tokio, …) in Phase 2 — then it raises update PRs automatically.
  # `cargo` covers the whole workspace from the root manifest.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
